<script>
(function() {
    var canvas = document.getElementById('live2dCanvas');
    var app, model, coreModel;
    var W = 390, H = 380;

    function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
    function lerp(a, b, t) { return a + (b - a) * t; }

    var mouse = { x:0.5, y:0.5 };
    var sm = { x:0.5, y:0.5 };

    var blink = {
        v: 1, timer: 0, next: 3, phase: 'open', elapsed: 0,
        count: 0, target: 1
    };

    function schedBlink() {
        blink.next = 2 + Math.random() * 5;
        blink.timer = 0;
        blink.target = Math.random() < 0.15 ? 2 : 1;
        blink.count = 0;
    }

    function startBlink() {
        blink.phase = 'closing';
        blink.elapsed = 0;
        blink.count++;
    }

    function updateBlink(dt) {
        blink.timer += dt;
        if (blink.phase === 'open' && blink.timer >= blink.next) {
            startBlink();
            return;
        }
        var ct = 0.06, ht = 0.05, ot = 0.12;
        switch (blink.phase) {
            case 'closing':
                blink.elapsed += dt;
                blink.v = 1 - blink.elapsed / ct;
                if (blink.elapsed >= ct) { blink.v = 0; blink.phase = 'closed'; blink.elapsed = 0; }
                break;
            case 'closed':
                blink.elapsed += dt;
                if (blink.elapsed >= ht) { blink.phase = 'opening'; blink.elapsed = 0; }
                break;
            case 'opening':
                blink.elapsed += dt;
                blink.v = blink.elapsed / ot;
                if (blink.elapsed >= ot) {
                    blink.v = 1; blink.phase = 'open'; blink.elapsed = 0;
                    if (blink.count < blink.target) { setTimeout(startBlink, 180); }
                    else { schedBlink(); }
                }
                break;
        }
    }

    function updateTracking(dt) {
        sm.x = lerp(sm.x, mouse.x, dt * 8);
        sm.y = lerp(sm.y, mouse.y, dt * 8);
    }

    function applyParams() {
        if (!coreModel) return;
        coreModel.setParameterValueById('ParamEyeLOpen', blink.v);
        coreModel.setParameterValueById('ParamEyeROpen', blink.v);
        var ex = clamp((sm.x - 0.5) * 2.2, -0.85, 0.85);
        var ey = clamp((sm.y - 0.5) * 2.2, -0.70, 0.70);
        coreModel.setParameterValueById('ParamEyeBallX', ex);
        coreModel.setParameterValueById('ParamEyeBallY', ey);
    }

        if (!model) return;
        model.scale.set(0.08);
        model.x = W * 0.48;
        model.y = H * 0.50;
        model.anchor.set(0.5, 0.5);

<script>
(function() {
  var songs = [
    { name: 'gta4', file: '/music/gta4.mp3' },
    { name: 'try', file: '/music/try.mp3' },
    { name: '可爱', file: '/music/可爱.mp3' },
    { name: '打上火花', file: '/music/打上火花.mp3' },
    { name: '谢谢', file: '/music/谢谢.mp3' },
    { name: 'L_Youd _ Zerky - TempIe', file: '/music/L_Youd _ Zerky - TempIe (混音_Remix).ogg' },
    { name: 'Virtual Riot - Purple Dragons', file: '/music/Virtual Riot - Purple Dragons (Dragons VIP).ogg' },
    { name: 'All We Know (Virtual Riot Remix)', file: '/music/Virtual Riot _ The Chainsmokers _ Phoebe Ryan - All We Know (Virtual Riot Remix).ogg' },
    { name: '昼夜 - 千与千寻', file: '/music/昼夜 - 千与千寻 (钢琴版).ogg' },
    { name: 'lucky (氛围版)', file: '/music/等一会就睡 - 【FREE】lucky (氛围版).ogg' }
  ];

  var audio = new Audio();
  var current = 0;
  var playing = false;

  var elPlay = document.getElementById('btn-play');
  var elTitle = document.getElementById('player-title');
  var elTime = document.getElementById('player-time');
  var elVolume = document.getElementById('player-volume');
  var elPlaylist = document.getElementById('player-playlist');
  var elBtnPlaylist = document.getElementById('btn-playlist');

  audio.volume = 0.02;

  function fmtTime(s) {
    if (!s || isNaN(s)) return '00:00';
    var m = Math.floor(s / 60);
    var sec = Math.floor(s % 60);
    return m + ':' + (sec < 10 ? '0' : '') + sec;
  }

  function load(i) {
    current = i;
    audio.src = songs[i].file;
    elTitle.textContent = songs[i].name;
    renderPlaylist();
    if (playing) {
      audio.play().catch(function(){});
    }
  }

  function togglePlay() {
    if (!audio.src) { load(0); }
    if (audio.paused) {
      audio.play().catch(function(){});
      playing = true;
      elPlay.textContent = '⏸';
    } else {
      audio.pause();
      playing = false;
      elPlay.textContent = '▶';
    }
  }

  function next() { load((current + 1) % songs.length); }
  function prev() { load((current - 1 + songs.length) % songs.length); }

  function renderPlaylist() {
    var html = '';
    for (var i = 0; i < songs.length; i++) {
      html += '<div class="pl-item' + (i === current ? ' active' : '') + '" data-idx="' + i + '">' + songs[i].name + '</div>';
    }
    elPlaylist.innerHTML = html;
  }

  elPlay.addEventListener('click', togglePlay);
  document.getElementById('btn-prev').addEventListener('click', prev);
  document.getElementById('btn-next').addEventListener('click', next);

  elVolume.addEventListener('input', function() {
    audio.volume = this.value / 100;
  });

  elBtnPlaylist.addEventListener('click', function(e) {
    e.stopPropagation();
    elPlaylist.classList.toggle('show');
  });

  elPlaylist.addEventListener('click', function(e) {
    var item = e.target.closest('.pl-item');
    if (!item) return;
    var idx = parseInt(item.getAttribute('data-idx'));
    if (idx !== current) {
      load(idx);
      if (!playing) togglePlay();
    }
  });

  document.addEventListener('click', function(e) {
    if (!elPlaylist.contains(e.target) && e.target !== elBtnPlaylist) {
      elPlaylist.classList.remove('show');
    }
  });

  audio.addEventListener('timeupdate', function() {
    elTime.textContent = fmtTime(audio.currentTime) + ' / ' + fmtTime(audio.duration || 0);
  });

  audio.addEventListener('ended', function() {
    load((current + 1) % songs.length);
  });

  audio.addEventListener('loadedmetadata', function() {
    elTime.textContent = fmtTime(audio.currentTime) + ' / ' + fmtTime(audio.duration || 0);
  });

  renderPlaylist();
})();
</script>
